#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "loki"
name = "Loki + Promtail"
description.en = "Set of components that can be composed into a fully featured logging stack"
description.fr = "Ensemble de composants qui peuvent être composés pour former une pile de journalisation complète"

version = "3.6.8~ynh1"

maintainers = ["fflorent"]

[upstream]
license = "AGPL-3.0"
website = "https://grafana.com/docs/loki/latest/"
admindoc = "https://grafana.com/docs/loki/latest/"
code = "https://github.com/grafana/loki"
cpe = "cpe:2.3:a:grafana:loki"

[integration]
yunohost = ">= 11.2"
architectures = ["amd64", "armhf", "arm64"]
multi_instance = true

ldap = "not_relevant"

sso = "not_relevant"

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]

[resources]
    [resources.sources]
    [resources.sources.main]
    amd64.url = "https://github.com/grafana/loki/releases/download/v3.6.8/loki-linux-amd64.zip"
    amd64.sha256 = "8b3fe25b91cee1206e5e3be25b4b79a9fc2a0ede16698953214519f4fd74a1fc"
    armhf.url = "https://github.com/grafana/loki/releases/download/v3.6.8/loki-linux-arm.zip"
    armhf.sha256 = "ab527d1a0128ec7b905162fd12bd4414cb70a8486f609b1ec6b5479459481035"
    arm64.url = "https://github.com/grafana/loki/releases/download/v3.6.8/loki-linux-arm64.zip"
    arm64.sha256 = "0eb9816d2b8606f8310d1035012c8412d83f497ab4fd20858bbd4d07ee7959a6"
    in_subdir = false
    rename = "loki"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^loki-linux-amd64.zip$"
    autoupdate.asset.armhf = "^loki-linux-arm.zip$"
    autoupdate.asset.arm64 = "^loki-linux-arm64.zip$"

    [resources.sources.promtail]
    amd64.url = "https://github.com/grafana/loki/releases/download/v3.6.8/promtail-linux-amd64.zip"
    amd64.sha256 = "504e8b343fb8cf89514def384d104039fdcfb13eddcc01403c7bb81fcfa5b539"
    armhf.url = "https://github.com/grafana/loki/releases/download/v3.6.8/promtail-linux-arm.zip"
    armhf.sha256 = "afc43285d931565863f87cf7a950d1d49a7ccfbc0a1bf799d8407e0a22cda58b"
    arm64.url = "https://github.com/grafana/loki/releases/download/v3.6.8/promtail-linux-arm64.zip"
    arm64.sha256 = "c7fdd71c2ddadbf15c8a32cdee064484d8ba7fb253023ffd2e76eb5f3ab4d13b"
    in_subdir = false
    rename = "promtail"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^promtail-linux-amd64.zip$"
    autoupdate.asset.armhf = "^promtail-linux-arm.zip$"
    autoupdate.asset.arm64 = "^promtail-linux-arm64.zip$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]

    [resources.ports]
    http.default = 3100
    grpc.default = 9096
    promtail.default = 9080
